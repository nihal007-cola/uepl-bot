<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEPL Inventory</title>

<link rel="icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:linear-gradient(135deg,#e8f0ff,#d6e4ff);
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#071a3a;
  padding:12px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
  color:white;
}

.logo{height:34px;}

.brand-title{font-weight:800;}
.brand-sub{font-size:11px;opacity:0.7;}

.right button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#1fbf6b;
  color:white;
  cursor:pointer;
}

/* LOGIN */
.login{
  display:flex;
  justify-content:center;
  align-items:center;
  height:80vh;
}

.box{
  background:white;
  padding:30px;
  border-radius:20px;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:20px;
  border:none;
  background:#f1f5ff;
}

/* APP */
.container{padding:20px;display:none;}

.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

.search{
  padding:10px;
  border-radius:20px;
  border:none;
  width:200px;
}

.btn{
  padding:10px 16px;
  border:none;
  border-radius:20px;
  background:#071a3a;
  color:white;
  cursor:pointer;
}

/* TABLE */
.table{
  width:100%;
  background:white;
  border-radius:16px;
  overflow:hidden;
}

.table th{
  background:#071a3a;
  color:white;
  padding:12px;
}

.table td{
  padding:12px;
  border-bottom:1px solid #eee;
}

.empty{
  text-align:center;
  padding:40px;
}

</style>
</head>

<body>

<div class="header">
  <div class="left">
    <img src="/logo.png" class="logo">
    <div>
      <div class="brand-title">UEPL Inventory</div>
      <div class="brand-sub">Powered by Offices of Nawnit Nihal</div>
    </div>
  </div>
  <div class="right">
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="login" id="loginBox">
  <div class="box">
    <h3>Password</h3>
    <input id="pass">
    <button class="btn" onclick="login()">Enter</button>
  </div>
</div>

<div class="container" id="app">

  <div class="topbar">
    <input class="search" id="search" placeholder="Search..." onkeyup="filter()">
    <button class="btn" onclick="exportPDF()">Export PDF</button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Item Code</th>
        <th>Item Name</th>
        <th>Count</th>
        <th>GSM</th>
        <th>Supplier</th>
        <th>Rate</th>
        <th>Stock</th>
      </tr>
    </thead>
    <tbody id="dataBody"></tbody>
  </table>

  <div class="empty" id="empty">No data</div>

</div>

<script>

const PASSWORD="1234";

let DATA=[];        // original data
let DISPLAY=[];     // filtered view

function login(){
  if(document.getElementById("pass").value===PASSWORD){
    loginBox.style.display="none";
    app.style.display="block";
    loadData();
  }else alert("GO AWAY BRUV!");
}

function logout(){location.reload();}

// 🔥 LOAD DATA FROM BACKEND
function loadData(){

  fetch('/api/items')
    .then(res => res.json())
    .then(data => {

      if(!data || data.length===0){
        DATA=[];
        DISPLAY=[];
        render();
        return;
      }

      DATA=data;
      DISPLAY=data;

      render();
    })
    .catch(err=>console.log(err));
}

// 🔥 RENDER TABLE
function render(){

  let body=document.getElementById("dataBody");
  body.innerHTML="";

  if(DISPLAY.length===0){
    empty.style.display="block";
    return;
  }

  empty.style.display="none";

  DISPLAY.forEach(d=>{
    body.innerHTML+=`
    <tr>
      <td>${d.code}</td>
      <td>${d.name}</td>
      <td>${d.count}</td>
      <td>${d.gsm}</td>
      <td>${d.supplier}</td>
      <td>${d.rate}</td>
      <td>${d.stock}</td>
    </tr>`;
  });
}

// 🔍 SEARCH (FIXED — NO DATA LOSS)
function filter(){
  let q=document.getElementById("search").value.toLowerCase();

  DISPLAY = DATA.filter(d =>
    JSON.stringify(d).toLowerCase().includes(q)
  );

  render();
}

// 📄 PDF
function exportPDF(){
  window.print();
}

// 🔥 LIVE AUTO REFRESH
setInterval(loadData, 5000);

</script>

</body>
</html>
