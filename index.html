<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEPL System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:linear-gradient(135deg,#e8f0ff,#d6e4ff);
}

/* HEADER */
.header{
  position:sticky;
  top:0;
  background:#071a3a;
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:white;
}

.brand{font-weight:800;}

button{
  padding:10px;
  border:none;
  border-radius:20px;
  background:#071a3a;
  color:white;
}

/* SWITCH */
.switch{
  display:flex;
  gap:10px;
  padding:10px;
}

.switch button{
  flex:1;
}

/* CARD */
.card{
  background:white;
  margin:10px;
  padding:16px;
  border-radius:16px;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#f1f5ff;
}

/* IMAGE */
.preview{
  width:100%;
  border-radius:12px;
  margin-top:10px;
}

/* LOG */
.log{
  background:#000;
  color:#0f0;
  padding:10px;
  height:120px;
  overflow:auto;
  font-size:12px;
  border-radius:10px;
  margin-top:10px;
}

/* TABLE */
.table{
  width:100%;
  background:white;
  border-radius:16px;
  overflow:hidden;
}

.table th{
  background:#071a3a;
  color:white;
  padding:10px;
  font-size:12px;
}

.table td{
  padding:10px;
  font-size:12px;
}

img.thumb{
  height:40px;
  border-radius:6px;
}

</style>
</head>

<body>

<div class="header">
  <div class="brand">UEPL System</div>
</div>

<div class="switch">
  <button onclick="showEntry()">Entry</button>
  <button onclick="showReport()">Report</button>
</div>

<!-- ENTRY -->
<div id="entry">

  <div class="card">

    <input type="file" id="image">

    <img id="preview" class="preview">

    <input id="item" placeholder="Item No">
    <input id="count" placeholder="Count">
    <input id="construction" placeholder="Construction">
    <input id="composition" placeholder="Composition">
    <input id="weight" placeholder="Weight">
    <input id="width" placeholder="Width">
    <input id="availability" placeholder="Availability">

    <button onclick="submitData()">Submit</button>

    <div class="log" id="log"></div>

  </div>

</div>

<!-- REPORT -->
<div id="report" style="display:none">

  <div class="card">
    <button onclick="loadData()">Refresh</button>
  </div>

  <table class="table">
    <thead>
      <tr>
        <th>Item No</th>
        <th>Count</th>
        <th>Construction</th>
        <th>Composition</th>
        <th>Weight</th>
        <th>Width</th>
        <th>Availability</th>
        <th>Image</th>
        <th>Timestamp</th>
      </tr>
    </thead>
    <tbody id="dataBody"></tbody>
  </table>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyLZYpvG43iBedT0iJzjZE0gFFbXviQR61KCTzIg4Sp9norCVZQPZH2wUISK5d_dWtL/exec";

let imageData = "";
let DATA = [];

/* MODULE SWITCH */
function showEntry(){
  entry.style.display="block";
  report.style.display="none";
}

function showReport(){
  entry.style.display="none";
  report.style.display="block";
  loadData();
}

/* LOG */
function log(msg){
  const el = document.getElementById("log");
  const time = new Date().toLocaleTimeString();
  el.innerHTML += `[${time}] ${msg}<br>`;
  el.scrollTop = el.scrollHeight;
}

/* IMAGE LOAD */
document.getElementById("image").onchange = function(e){
  const file = e.target.files[0];

  const reader = new FileReader();
  reader.onload = function(evt){
    imageData = evt.target.result;
    document.getElementById("preview").src = imageData;
    log("Image loaded");
  };
  reader.readAsDataURL(file);
}

/* SUBMIT */
async function submitData(){

  const item = document.getElementById("item").value;

  if(!item || !imageData){
    log("Missing item or image");
    return;
  }

  log("Processing image...");

  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = imageData;

  img.onload = async function(){

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    // branding strip
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, canvas.height-60, canvas.width, 60);

    ctx.fillStyle = "white";
    ctx.font = "20px Inter";

    ctx.fillText("Offices of Nawnit Nihal", 10, canvas.height-25);
    ctx.fillText(item, canvas.width-200, canvas.height-25);

    const finalImage = canvas.toDataURL("image/jpeg");

    log("Uploading...");

    const res = await fetch(API, {
      method:"POST",
      body: JSON.stringify({
        action:"add",
        item,
        count:count.value,
        construction:construction.value,
        composition:composition.value,
        weight:weight.value,
        width:width.value,
        availability:availability.value,
        image: finalImage
      })
    });

    const data = await res.json();

    log("Saved successfully");

  }
}

/* LOAD REPORT */
function loadData(){

  fetch(API + "?action=get")
    .then(res=>res.json())
    .then(data=>{
      DATA = data;
      render();
    });
}

/* RENDER */
function render(){

  let body=document.getElementById("dataBody");
  body.innerHTML="";

  DATA.forEach(d=>{
    body.innerHTML+=`
    <tr>
      <td>${d.item || ''}</td>
      <td>${d.count || ''}</td>
      <td>${d.construction || ''}</td>
      <td>${d.composition || ''}</td>
      <td>${d.weight || ''}</td>
      <td>${d.width || ''}</td>
      <td>${d.availability || ''}</td>
      <td>${d.image ? `<a href="${d.image}" target="_blank">View</a>` : ''}</td>
      <td>${d.timestamp || ''}</td>
    </tr>`;
  });
}

</script>

</body>
</html>
