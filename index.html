<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UEPL System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:linear-gradient(135deg,#e8f0ff,#d6e4ff);
}

.header{
  background:#071a3a;
  padding:12px 16px;
  display:flex;
  align-items:center;
  color:white;
}

.logo{height:32px;margin-right:10px;}

.brand-title{font-weight:800;}
.brand-sub{font-size:11px;opacity:0.7;}

.switch{
  display:flex;
  gap:10px;
  padding:10px;
}

.switch button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#1fbf6b;
  color:white;
  font-weight:600;
}

.table{
  width:100%;
  background:white;
  border-radius:16px;
  overflow:auto;
  font-size:12px;
}

.table th{
  background:#071a3a;
  color:white;
  padding:10px;
}

.table td{
  padding:8px;
  border-bottom:1px solid #eee;
}

input{
  width:100%;
  padding:6px;
  border:none;
  background:#f1f5ff;
  border-radius:6px;
}

.preview{width:50px;border-radius:6px;}

.submit{
  width:100%;
  margin:10px;
  padding:12px;
  border:none;
  border-radius:20px;
  background:#e63946;
  color:white;
  font-weight:700;
}

.small-btn{
  padding:6px 10px;
  border:none;
  border-radius:12px;
  background:#e63946;
  color:white;
  font-size:11px;
}

.log{
  background:#000;
  color:#0f0;
  padding:10px;
  height:120px;
  overflow:auto;
  margin:10px;
  border-radius:10px;
  font-size:12px;
}

/* REPORT TOOLS */
.tools{
  display:flex;
  gap:10px;
  padding:10px;
}

.tools input{
  flex:1;
}

.tools button{
  background:#071a3a;
  color:white;
  border:none;
  border-radius:10px;
  padding:8px 12px;
}

</style>
</head>

<body>

<div class="header">
  <img src="/logo.png" class="logo">
  <div>
    <div class="brand-title">UEPL System</div>
    <div class="brand-sub">Powered by Offices of Nawnit Nihal</div>
  </div>
</div>

<div class="switch">
  <button onclick="showEntry()">Entry</button>
  <button onclick="showReport()">Report</button>
</div>

<!-- ENTRY -->
<div id="entry">

<table class="table">
<thead>
<tr>
<th>Img</th>
<th>Item</th>
<th>Count</th>
<th>Construction</th>
<th>Composition</th>
<th>Weight</th>
<th>Width</th>
<th>Availability</th>
<th>Action</th>
</tr>
</thead>
<tbody id="entryBody"></tbody>
</table>

<button class="submit" onclick="submitAll()">🚀 Submit All</button>

<div class="log" id="log"></div>

</div>

<!-- REPORT -->
<div id="report" style="display:none">

<div class="tools">
  <input id="search" placeholder="Search..." onkeyup="filter()">
  <button onclick="printTable()">Print</button>
  <button onclick="exportCSV()">Export</button>
</div>

<table class="table" id="reportTable">
<thead>
<tr>
<th>Item</th>
<th>Count</th>
<th>Construction</th>
<th>Composition</th>
<th>Weight</th>
<th>Width</th>
<th>Availability</th>
<th>Image</th>
</tr>
</thead>
<tbody id="dataBody"></tbody>
</table>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyLZYpvG43iBedT0iJzjZE0gFFbXviQR61KCTzIg4Sp9norCVZQPZH2wUISK5d_dWtL/exec";

let rows = [];
let DATA = [];

/* INIT */
function init(){
  let body = document.getElementById("entryBody");

  for(let i=0;i<10;i++){
    rows[i] = { image:"" };

    body.innerHTML += `
    <tr>
      <td>
        <input type="file" onchange="loadImg(event,${i})">
        <img id="img${i}" class="preview">
      </td>
      <td><input id="item${i}"></td>
      <td><input id="count${i}"></td>
      <td><input id="construction${i}"></td>
      <td><input id="composition${i}"></td>
      <td><input id="weight${i}"></td>
      <td><input id="width${i}"></td>
      <td><input id="availability${i}"></td>
      <td><button class="small-btn" onclick="submitOne(${i})">Submit</button></td>
    </tr>`;
  }
}
init();

/* IMAGE */
function loadImg(e,i){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = e=>{
    rows[i].image = e.target.result;
    document.getElementById("img"+i).src = rows[i].image;
  };
  reader.readAsDataURL(file);
}

/* LOG */
function log(msg){
  let el=document.getElementById("log");
  el.innerHTML+=msg+"<br>";
}

/* PROCESS */
async function processRow(i){
  let item=document.getElementById("item"+i).value;
  if(!item||!rows[i].image) return;

  let img=new Image();
  img.src=rows[i].image;
  await new Promise(r=>img.onload=r);

  let canvas=document.createElement("canvas");
  let ctx=canvas.getContext("2d");

  canvas.width=img.width;
  canvas.height=img.height;

  ctx.drawImage(img,0,0);

  ctx.fillStyle="black";
  ctx.fillRect(0,canvas.height-60,canvas.width,60);

  ctx.fillStyle="white";
  ctx.fillText("Offices of Nawnit Nihal",10,canvas.height-20);
  ctx.fillText(item,canvas.width-150,canvas.height-20);

  let final=canvas.toDataURL("image/jpeg");

  await fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"add",
      item,
      count:count0?.value,
      construction:construction0?.value,
      composition:composition0?.value,
      weight:weight0?.value,
      width:width0?.value,
      availability:availability0?.value,
      image:final
    })
  });

  log("Saved "+item);
}

async function submitOne(i){await processRow(i);}

async function submitAll(){
  for(let i=0;i<10;i++){await processRow(i);}
}

/* REPORT */
function showReport(){
  entry.style.display="none";
  report.style.display="block";

  fetch(API+"?action=get")
  .then(r=>r.json())
  .then(d=>{
    DATA=d;
    render(DATA);
  });
}

function render(data){
  let body=document.getElementById("dataBody");
  body.innerHTML="";

  data.forEach(d=>{
    body.innerHTML+=`
    <tr>
    <td>${d.item||""}</td>
    <td>${d.count||""}</td>
    <td>${d.construction||""}</td>
    <td>${d.composition||""}</td>
    <td>${d.weight||""}</td>
    <td>${d.width||""}</td>
    <td>${d.availability||""}</td>
    <td><a href="${d.image}" target="_blank">View</a></td>
    </tr>`;
  });
}

/* SEARCH */
function filter(){
  let q=search.value.toLowerCase();
  render(DATA.filter(d=>JSON.stringify(d).toLowerCase().includes(q)));
}

/* PRINT */
function printTable(){
  window.print();
}

/* EXPORT */
function exportCSV(){
  let csv="Item,Count,Construction,Composition,Weight,Width,Availability\n";
  DATA.forEach(d=>{
    csv+=`${d.item},${d.count},${d.construction},${d.composition},${d.weight},${d.width},${d.availability}\n`;
  });

  let blob=new Blob([csv]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="report.csv";
  a.click();
}

function showEntry(){
  report.style.display="none";
  entry.style.display="block";
}

</script>

</body>
</html>
